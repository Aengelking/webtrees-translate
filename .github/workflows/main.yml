name: Deploy module via FTP

# Uploads the translate-notes module to the webtrees server over FTPS whenever
# main changes. Configure these repository secrets first
# (Settings -> Secrets and variables -> Actions):
#
#   FTP_SERVER      - host name, e.g. ftp.sackstiftung.com
#   FTP_USERNAME    - FTP user
#   FTP_PASSWORD    - FTP password
#   FTP_SERVER_DIR  - target folder on the server, WITH a trailing slash, e.g.
#                     /httpdocs/modules_v4/translate-notes/
#
# If your host does not support FTPS, change `protocol` below to `ftp`.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy translate-notes to modules_v4
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # Only the module folder is uploaded (not README / .github).
          local-dir: ./translate-notes/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}

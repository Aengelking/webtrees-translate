name: Deploy module via SFTP

# Uploads the translate-notes module to the webtrees server over SFTP whenever
# main changes. (The host - Strato - only offers SFTP on port 22, not FTP/FTPS.)
#
# Configure these repository secrets first
# (Settings -> Secrets and variables -> Actions):
#
#   FTP_SERVER      - host name, e.g. ssh.strato.de or your domain
#   FTP_USERNAME    - SSH/SFTP user (on Strato this is usually the same as the
#                     FTP user; check Strato control panel -> "SSH/SFTP access")
#   FTP_PASSWORD    - SSH/SFTP password
#   FTP_SERVER_DIR  - absolute target path on the server, e.g.
#                     /modules_v4/translate-notes/  (or the full path your
#                     hosting uses, ending with the module folder name)
#
# If your host needs a key instead of a password, swap `password` for
# `ssh_private_key` and store the key in an SSH_PRIVATE_KEY secret.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy translate-notes to modules_v4
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          port: 22
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Upload the contents of the module folder into the target directory.
          local_path: './translate-notes/*'
          remote_path: ${{ secrets.FTP_SERVER_DIR }}
          sftp_only: true
